server:
    port: 9000

spring:
    application:
        name: api-gateway
    cloud:
        gateway:
            server:
                webflux:
                    globalcors:
                        cors-configurations:
                            '[/**]':
                                allowedOrigins: "http://localhost:5173"
                                allowedMethods:
                                    - GET
                                    - POST
                                    - OPTIONS
                                allowedHeaders: "*"
                                allowCredentials: true

                    routes:
                        # Route for placing orders
                        - id: order-service-buy
                          uri: http://localhost:8081
                          predicates:
                            - Path=/api/v1/orders/**

                        # Route for fetching recent orders from worker
                        - id: worker-service-recent
                          uri: http://localhost:8082
                          predicates:
                            - Path=/api/v1/worker/**
    threads:
        virtual:
            enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"